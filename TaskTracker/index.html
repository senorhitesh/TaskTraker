<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet"
    />
    <title>tasktracker</title>
  </head>
  <body>
    <div id="app" class="bg-amber-900">
      <div id="page1" class="max-w-6xl mx-auto">
        <div id="navbar">
          <div id="navbar-glow"></div>
          <p>TaskTracker<span class="dot">.</span></p>
          <div class="date-controls">
            <select id="month">
              <option>January</option>
              <option>February</option>
              <option>March</option>
              <option>April</option>
              <option>May</option>
              <option>June</option>
              <option>July</option>
              <option>August</option>
              <option>September</option>
              <option>October</option>
              <option>November</option>
              <option>December</option>
            </select>
            <select id="year">
              <option>2026</option>
            </select>
          </div>
        </div>
        <div id="mainText">
          <p id="heroText">
            Manage Your Tasks <br />
            <span>Efficiently.</span>
          </p>
        </div>
        <div id="hero">
          <div id="task-grid">
            <div id="grid-header">
              <div class="task-label-header">Tasks</div>
              <div class="days-header" id="days-header"></div>
            </div>
            <div id="rows-container"></div>
            <button id="add-btn">+ Add Task</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
